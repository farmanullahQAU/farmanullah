<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="description"
    content="Farman Ullah – Senior Flutter Developer. 4+ years experience building production Android & iOS apps with Firebase, Web3, and AI integrations.">
  <meta name="keywords"
    content="Flutter Developer, Mobile App Developer, Android, iOS, Firebase, Web3, Blockchain, Pakistan">
  <meta name="author" content="Farman Ullah">

  <!-- Open Graph -->
  <meta property="og:title" content="Farman Ullah – Flutter Developer">
  <meta property="og:description"
    content="Senior Flutter Developer specializing in cross-platform apps, Firebase, Web3 and AI integrations.">
  <meta property="og:type" content="website">

  <!-- 
    PERFORMANCE: Preload critical engine files so they start downloading
    in parallel with the HTML parse, shaving hundreds of ms off first load.
    The browser will fetch these as HIGH-priority resources immediately.
  -->
  <link rel="preload" href="flutter_bootstrap.js" as="script">
  <link rel="modulepreload" href="main.dart.js">

  <!-- DNS prefetch for fonts (only used if they load from network) -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Farman Ullah">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Farman Ullah – Flutter Developer</title>
  <link rel="manifest" href="manifest.json">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* 
      PERF: body background matches the splash so there is zero visible 
      color shift between the HTML splash and the Flutter app painting.
      This eliminates the jarring "flash" entirely.
    */
    html,
    body {
      background-color: #07060F;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      /* Prevent any layout reflow during load */
      -webkit-font-smoothing: antialiased;
    }

    body.loaded {
      overflow: auto;
    }

    #splash-screen {
      position: fixed;
      inset: 0;
      background: #07060F;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      /* Smooth fade out when Flutter is ready */
      transition: opacity 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #splash-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Ambient glow blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
    }

    .blob-1 {
      width: 450px;
      height: 450px;
      top: -130px;
      right: -90px;
      background: rgba(155, 64, 248, 0.11);
    }

    .blob-2 {
      width: 320px;
      height: 320px;
      bottom: -90px;
      left: -70px;
      background: rgba(0, 229, 255, 0.05);
    }

    .splash-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 1;
      animation: fadeUp 0.65s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .splash-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      border-radius: 60px;
      border: 1px solid rgba(155, 64, 248, 0.35);
      background: rgba(155, 64, 248, 0.08);
      margin-bottom: 22px;
    }

    .splash-badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #00E5FF;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.35;
      }
    }

    .splash-badge-text {
      font-size: 12px;
      font-weight: 600;
      color: #BB6BFF;
      letter-spacing: 0.3px;
    }

    .splash-name {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: -2.5px;
      line-height: 1.0;
      color: #F0EEFF;
    }

    .splash-name span {
      background: linear-gradient(90deg, #9B40F8, #BB6BFF, #00E5FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .splash-role {
      margin-top: 10px;
      font-size: 15px;
      font-weight: 500;
      color: #9D96C4;
      letter-spacing: 0.5px;
    }

    /* Progress bar — replaces spinning loader for cleaner, more modern feel */
    .splash-progress {
      margin-top: 52px;
      width: 56px;
      height: 3px;
      background: rgba(155, 64, 248, 0.18);
      border-radius: 3px;
      overflow: hidden;
    }

    .splash-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #9B40F8, #00E5FF);
      border-radius: 3px;
      animation: progress 1.6s ease-in-out infinite;
    }

    @keyframes progress {
      0% {
        width: 0%;
        margin-left: 0%;
      }

      45% {
        width: 65%;
        margin-left: 0%;
      }

      85% {
        width: 15%;
        margin-left: 85%;
      }

      100% {
        width: 0%;
        margin-left: 100%;
      }
    }

    @media (max-width: 480px) {
      .splash-name {
        font-size: 38px;
        letter-spacing: -1.5px;
      }
    }

    /* 
      CRITICAL: This invisible div ensures flt-glass-pane (Flutter's canvas)
      starts rendering on top of the splash correctly
    */
    flt-glass-pane {
      z-index: 1000 !important;
    }
  </style>
</head>

<body>
  <!-- Splash screen — visible immediately, no JS required to show -->
  <div id="splash-screen">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="splash-content">
      <div class="splash-badge">
        <div class="splash-badge-dot"></div>
        <span class="splash-badge-text">Available for hire</span>
      </div>
      <div class="splash-name">Farman <span>Ullah</span></div>
      <div class="splash-role">Flutter Developer · 4+ Years</div>
      <div class="splash-progress">
        <div class="splash-progress-bar"></div>
      </div>
    </div>
  </div>

  <script>
    // ─── Splash dismiss logic ────────────────────────────────────────────────
    var _splashDismissed = false;

    function hideSplash() {
      if (_splashDismissed) return;
      _splashDismissed = true;

      var splash = document.getElementById('splash-screen');
      if (!splash) return;

      // Small delay so Flutter has time to paint first frame fully
      setTimeout(function () {
        splash.classList.add('hidden');
        setTimeout(function () {
          splash.remove();
          document.body.classList.add('loaded');
        }, 600);
      }, 80);
    }

    // Primary trigger: Flutter fires this event when first frame is drawn
    window.addEventListener('flutter-first-frame', hideSplash);

    // Safety fallback: force dismiss after 8s max (slow connections)
    setTimeout(hideSplash, 8000);
    // ─────────────────────────────────────────────────────────────────────────
  </script>

  <!--
    PERFORMANCE: async attribute lets the browser parse HTML and download
    other resources in parallel. Flutter bootstrap handles its own timing.
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
